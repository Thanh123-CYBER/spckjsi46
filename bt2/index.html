<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, white, white);
    }

    .login-box {
        width: 320px;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .input-box {
        margin-bottom: 15px;
    }

    .input-box input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        outline: none;
        transition: 0.3s;
    }

    .input-box input:focus {
        border-color: #6d28d9;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #6d28d9;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #5b21b6;
    }
</style>

<body>
    <script type="module" src="index.js">

    </script>

    <div1 class="login-box">
        <h1>Login</h1>
        <div class="input-box"><input type="text" placeholder="name" id="input_name"> </input>
            <input type="email" placeholder="email" required id=input_email></input>
            <br><input type="password" placeholder="password" required id=input_password></input>
        </div>
        <a href="#" class="button">Can su giup do </a><br>
        <a href="#" class="button">Sign in</a>
        <div class="button"><br><button id="button1">Ok</button></div>
        
    </div1>
    <div class="user_informations"></div>

</body>

</html>
