<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>

</style>
</head>

<body>

<div class="signup-box">
    <h1>Create Account</h1>

    <div class="input-group">
        <label>Username</label>
        <input type="text" placeholder="Enter your username" id="username_register">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" id="email_register">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password" id="password_register">
    </div>

    <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm your password">
    </div>

    <button class="signup-btn" id="register_btn">Sign Up</button>

    <div class="links">
        <a href="..//Login/login.html">Already have an account? Login</a>
    </div>
</div>
<link rel="stylesheet" href="signin.css">
<script src="signin.js" type="module"></script>
</body>
</html>
