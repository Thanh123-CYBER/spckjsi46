
<!DOCTYPE html>

  <title>Settings</title>

  <link rel="stylesheet" href="settings.css">
  <script src="settings.js" type="module" defer></script>
</head>

<body>
  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <h2>⚙️ Account Settings</h2>

      <div class="setting-group">
        <label for="avatar">Avatar</label>
        <input type="file" id="avatar" accept="image/*">
      </div>

      <div class="setting-group">
        <label for="username">New Username</label>
        <input type="text" id="username" placeholder="Enter new username">
      </div>

      <div class="setting-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Enter new password">
      </div>

      <div class="button-group">
        <button class="save-settings" id="save">
          Save Changes
        </button>

        <a href="../menu/index.html" class="close-settings">
          Close
        </a>

        <a href="../Login/login.html" class="logout-btn" id="logout-btn">
                    Logout
                </a>
      </div>
    </div>
  </div>
</body>

</html>
