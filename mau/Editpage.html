<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Edit Product</title>
    <script type="module">
      import { v4 as uuidv4 } from "https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/esm-browser/index.js";
      window.uuidv4 = uuidv4;
    </script>
    <style>
      .product-list {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        width: 250px;
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 16px;
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
      }

      .card button {
        margin-top: 10px;
        padding: 8px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="product-list">
      <div class="card">
        <img src="IMAGE_URL" alt="product" />

        <h2>Tên sản phẩm</h2>

        <p>Giá: 500.000đ</p>

        <p>Mô tả sản phẩm...</p>

        <p>Số lượng: 10</p> 

        <button>Edit</button>
      </div>
    </div>
  </body>
</html>
