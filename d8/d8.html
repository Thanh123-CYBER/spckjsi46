<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Edit Product</title>
    <script type="module">
        import { v4 as uuidv4 } from "https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/esm-browser/index.js";
        window.uuidv4 = uuidv4;
    </script>
    <style>
        /* CSS Gốc của bạn kết hợp giao diện Form gọn gàng lệch trái */
        body { font-family: sans-serif; padding: 20px; color: #333; }
        
        .form-box input, .form-box textarea { 
            display: block; 
            width: 300px; 
            margin: 5px 0 15px 0; 
            padding: 6px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        .form-box button { 
            padding: 6px 15px; 
            background: green; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }

        .product-list { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            margin-top: 20px; 
        }
        .card { 
            width: 250px; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            padding: 16px; 
        }
        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
        .card button { 
            margin-top: 10px; 
            padding: 8px 16px; 
            cursor: pointer; 
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <input type="hidden" id="id"> <label>Name</label> <input type="text" id="name">
        <label>Price</label> <input type="number" id="price">
        <label>Image URL</label> <input type="text" id="img">
        <label>Quantity</label> <input type="number" id="qty">
        <label>Description</label> <textarea id="desc" rows="3"></textarea>
        
        <button id="btn-save">Save</button>
    </div>

    <hr style="margin-top: 20px; border: 0; border-top: 1px solid #eee;">

    <div class="product-list" id="list"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
