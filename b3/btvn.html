<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
    body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
    }

    .container {
        max-width: 400px;
        margin: auto;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
        width: 60%;
        padding: 8px;
        margin-right: 5px;
    }

    button {
        padding: 8px 10px;
        cursor: pointer;
    }

    .categories {
        margin-top: 10px;
    }

    .categories button {
        margin-right: 5px;
        margin-top: 5px;
    }

    .product {
        padding: 10px;
        margin-top: 10px;
        background: #eee;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div class="container">
    <input id="searchInput" placeholder="Enter name">
    <button onclick="searchProducts()">Search</button>

    <div class="categories">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Bag')">Bag</button>
        <button onclick="filterCategory('Shirt')">Shirt</button>
        <button onclick="filterCategory('Shoes')">Shoes</button>
    </div>

    <div id="productList"></div>
</div>

<script>
const products = [
    { name: "bag", category: "Bag" },
    { name: "shirt", category: "Shirt" },
    { name: "Shoes", category: "Shoes" },
    { name: "Bag vip", category: "Bag" },
    { name: "vip shirt", category: "Shirt" },
    { name: "Boots", category: "Shoes" }
];

let currentCategory = "All";

function render(list) {
    const container = document.getElementById("productList");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<p>No products found</p>";
        return;
    }

    list.forEach(p => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `<b>${p.name}</b><br><small>${p.category}</small>`;
        container.appendChild(div);
    });
}

function searchProducts() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();

    let filtered = products.filter(p =>
        p.name.toLowerCase().includes(keyword)
    );

    if (currentCategory !== "All") {
        filtered = filtered.filter(p => p.category === currentCategory);
    }

    render(filtered);
}

function filterCategory(category) {
    currentCategory = category;

    let filtered = products;

    if (category !== "All") {
        filtered = products.filter(p => p.category === category);
    }

    const keyword = document.getElementById("searchInput").value.toLowerCase();
    if (keyword) {
        filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(keyword)
        );
    }

    render(filtered);
}


document.getElementById("searchInput").addEventListener("input", searchProducts);


</script>
</body>
</html>
